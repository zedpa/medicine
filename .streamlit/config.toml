# 前端主题 token（spec-006 UI 重设计；本草典籍 × 分子网络）
# 配色规避三种 AI 默认观感：暖奶油+衬线+陶土 / 暗底+荧光绿 / broadsheet 细线。
[theme]
primaryColor = "#1f6b4f"            # 松绿（植物学主色，按钮/选项卡/控件强调）
backgroundColor = "#FAFBF8"         # 矿物冷白（非暖奶油 #F4F1EA）
secondaryBackgroundColor = "#EBF0EA" # 柔和苔绿（侧栏/卡片）
textColor = "#1b2a23"               # 松墨（带绿调近黑）
font = "sans serif"                 # 基础 UI 用无衬线；标题经 CSS 切到思源宋体
